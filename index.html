<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  
  <!-- ✅ Swiper CSS CDN -->
<!-- ✅ SWIPER CSS -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
/>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>

<body>

<video id="player" controls autoplay width="800" height="700"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    const source = "https://tfxl1gr3uomttgr31hp3tfa3dqmmcpf5gkce.100ycdn.com/live1.streambylivepulse.com/live/channel6/playlist.m3u8?wsSecret=b9af50e7e1f039727390f2bedab8f1e0&wsABSTime=1784097137&wsSession=8086978a02d5f30423e11259-178413940768562&wsIPSercert=1c07fe2b247d6eb3a89fd3cf4fc9086e&wsBindIP=2&wsserid=1168201446950356247";
    const video = document.getElementById('player');

    if (Hls.isSupported()) {

      const hls = new Hls();

      hls.loadSource(source);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {

        const qualities = hls.levels.map(l => l.height).filter(Boolean);

        new Plyr(video, {
          controls: [
            'play-large',
            'play',
            'progress',
            'current-time',
            'mute',
            'volume',
            'settings',
            'fullscreen'
          ],
          settings: ['quality', 'speed'],
          quality: {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: (quality) => {
              hls.levels.forEach((level, i) => {
                if (level.height === quality) {
                  hls.currentLevel = i;
                }
              });
            }
          }
        });

        video.play().catch(() => {});
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {

      video.src = source;
      video.addEventListener('loadedmetadata', () => video.play());

    }

</script>
